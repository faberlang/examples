[[case]]
id = "qwen3-oracle-backed-json"
args = [
  "embed",
  "examples/ai-workbench/harness/fixtures/embed/texts.txt",
  "--model",
  "mid/qwen3-embed-0.6b",
  "--out",
  "/tmp/faber-ai-qwen3-vectors-oracle.fvi",
  "--format",
  "json",
  "--alias-map",
  "examples/ai-workbench/harness/fixtures/embed/qwen3-local-alias.toml",
  "--oracle-runner",
  "examples/ai-workbench/harness/fixtures/embed/fake_qwen3_oracle.py",
  "--oracle-label",
  "hermetic-qwen3-fixture",
]
stdout_contains = [
  "\"model\":\"mid/qwen3-embed-0.6b\"",
  "\"source\":\"Qwen/Qwen3-Embedding-0.6B\"",
  "\"status\":\"oracle-backed\"",
  "\"dimensions\":1024",
  "\"oracle\":\"hermetic-qwen3-fixture\"",
  "vectors produced by explicit oracle runner; Faber-owned transformer execution not implemented",
]
out_path = "/tmp/faber-ai-qwen3-vectors-oracle.fvi"
expect_output_file = true
artifact_equals = { format = "fvi-stage2", model = "mid/qwen3-embed-0.6b", source = "Qwen/Qwen3-Embedding-0.6B", status = "oracle-backed", input_count = 2, dimensions = 1024, normalization = "l2", oracle = "hermetic-qwen3-fixture" }
exit = 0

[[case]]
id = "qwen3-failing-oracle-removes-stale-output-json"
