  "--out",
  "/tmp/faber-ai-qwen3-vectors-stale-oracle.fvi",
  "--format",
  "json",
  "--alias-map",
  "examples/ai-workbench/harness/fixtures/embed/qwen3-local-alias.toml",
  "--oracle-runner",
  "examples/ai-workbench/harness/fixtures/embed/failing_oracle.py",
]
stdout_contains = [
  "\"status\":\"error\"",
  "oracle runner failed",
]
out_path = "/tmp/faber-ai-qwen3-vectors-stale-oracle.fvi"
