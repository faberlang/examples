[[case]]
id = "blocked-no-oracle-json"
args = [
  "generate",
  "examples/ai-workbench/harness/fixtures/generate/prompt.txt",
  "--model",
  "stretch/qwen3-4b-fp8",
  "--out",
  "/tmp/faber-ai-generate-blocked.jsonl",
  "--format",
  "json",
  "--alias-map",
  "examples/ai-workbench/harness/fixtures/generate/local-alias.toml",
]
stdout_contains = [
  "\"status\":\"blocked\"",
  "\"streaming\":false",
  "Generation execution for stretch/qwen3-4b-fp8 not implemented; use an explicit oracle-backed runner",
]
out_path = "/tmp/faber-ai-generate-blocked.jsonl"
expect_output_file = true
artifact_events = ["metadata", "diagnostic"]
artifact_contains = ["\"status\":\"blocked\"", "Generation execution for stretch/qwen3-4b-fp8 not implemented"]
exit = 0

