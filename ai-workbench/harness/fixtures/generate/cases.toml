[[case]]
id = "oracle-backed-json"
args = [
  "generate",
  "examples/ai-workbench/harness/fixtures/generate/prompt.txt",
  "--model",
  "stretch/qwen3-4b-fp8",
  "--out",
  "/tmp/faber-ai-generate-oracle.jsonl",
  "--format",
  "json",
  "--alias-map",
  "examples/ai-workbench/harness/fixtures/generate/local-alias.toml",
  "--oracle-runner",
  "examples/ai-workbench/harness/fixtures/generate/fake_generate_oracle.py",
  "--oracle-label",
  "hermetic-generate-fixture",
  "--max-new-tokens",
  "4",
  "--temperature",
  "0",
  "--seed",
  "7",
]
stdout_contains = [
  "\"status\":\"oracle-backed\"",
  "\"streaming\":true",
  "\"oracle\":\"hermetic-generate-fixture\"",
  "generated by explicit oracle runner; Faber-owned transformer execution not implemented",
]
out_path = "/tmp/faber-ai-generate-oracle.jsonl"
expect_output_file = true
artifact_events = ["metadata", "token", "token", "final"]
artifact_contains = ["\"status\":\"oracle-backed\"", "\"final\"", "Local inventory."]
exit = 0

[[case]]
id = "unsafe-oracle-label-json"
args = [
  "generate",
