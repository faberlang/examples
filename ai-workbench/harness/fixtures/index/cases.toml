[[case]]
id = "happy-index-json"
args = [
  "index",
  "examples/ai-workbench/harness/fixtures/index/vectors.fvi",
  "--out",
  "/tmp/faber-ai-index.fvi",
  "--format",
  "json",
]
stdout_contains = [
  "\"status\":\"ok\"",
  "\"model\":\"basic/minilm\"",
  "\"source\":\"sentence-transformers/all-MiniLM-L6-v2\"",
  "\"input_vectors\":3",
  "\"dimensions\":3",
  "\"metric\":\"cosine\"",
]
out_path = "/tmp/faber-ai-index.fvi"
expect_output_file = true
artifact_equals = { format = "fvi-stage3-index", source_format = "fvi-stage2", model = "basic/minilm", input_vectors = 3, dimensions = 3, metric = "cosine", normalization = "l2" }
artifact_vector_count = 3
exit = 0

[[case]]
id = "missing-vector-artifact-json"
args = [
  "index",
  "examples/ai-workbench/harness/fixtures/index/does-not-exist.fvi",
  "--out",
  "/tmp/faber-ai-index-missing.fvi",
  "--format",
  "json",
]
stdout_contains = [
  "\"status\":\"error\"",
  "vector artifact not found: examples/ai-workbench/harness/fixtures/index/does-not-exist.fvi",
]
out_path = "/tmp/faber-ai-index-missing.fvi"
expect_output_file = false
exit = 0

