[[case]]
id = "basic-minilm-missing-json"
args = ["model", "inspect", "basic/minilm", "--format", "json"]
stdout_contains = [
  "\"alias\":\"basic/minilm\"",
  "\"status\":\"missing-download\"",
  "\"files\":[]",
  "\"tensors\":[]",
  "sentence-transformers/all-MiniLM-L6-v2",
]
exit = 0

[[case]]
id = "qwen36-router-json"
args = ["model", "inspect", "daily/qwen36-35b-a3b-q4", "--format", "json"]
stdout_contains = [
  "\"status\":\"router-backed\"",
  "\"format\":\"gguf\"",
  "qwen36-35b-a3b-q4",
  "\"local_path\":\"\"",
]
exit = 0

[[case]]
id = "unknown-text"
args = ["model", "inspect", "not/a-known-alias"]
stdout_contains = [
  "status: unknown",
  "diagnostic: unknown alias or unsupported path",
]
exit = 0

[[case]]
id = "missing-map-json"
args = [
  "model",
  "inspect",
  "basic/minilm",
  "--format",
  "json",
  "--alias-map",
  "/tmp/faber-ai-missing-alias-map.toml",
]
stdout_contains = [
  "\"status\":\"error\"",
  "alias map not found: /tmp/faber-ai-missing-alias-map.toml",
]
compare_campaign = false
absent_path = "/tmp/faber-ai-missing-alias-map.toml"
exit = 0

[[case]]
id = "package-subset-map-json"
args = [
  "model",
  "inspect",
  "basic/minilm",
  "--format",
  "json",
  "--alias-map",
  "examples/ai-workbench/harness/fixtures/model-inspect/maps/subset-aliases.toml",
]
stdout_contains = [
  "\"status\":\"missing-download\"",
  "sentence-transformers/all-MiniLM-L6-v2",
]
compare_campaign = false
exit = 0

[[case]]
id = "outside-subset-map-json"
args = [
  "model",
  "inspect",
  "basic/minilm",
  "--format",
  "json",
  "--alias-map",
  "examples/ai-workbench/harness/fixtures/model-inspect/maps/outside-subset-valid.toml",
]
stdout_contains = [
  "\"status\":\"error\"",
  "alias map outside supported subset: examples/ai-workbench/harness/fixtures/model-inspect/maps/outside-subset-valid.toml",
]
compare_campaign = false
exit = 0
