[[case]]
id = "router-backed-json"
args = [
  "chat",
  "examples/ai-workbench/harness/fixtures/chat/prompt.txt",
  "--model",
  "daily/qwen36-35b-a3b-q4",
  "--out",
  "/tmp/faber-ai-chat-router.jsonl",
  "--format",
  "json",
  "--alias-map",
  "examples/ai-workbench/harness/fixtures/chat/local-alias.toml",
  "--router-runner",
  "examples/ai-workbench/harness/fixtures/chat/fake_chat_router.py",
  "--router-label",
  "hermetic-llama-router",
  "--router-url",
  "http://127.0.0.1:18173/v1",
]
stdout_contains = [
  "\"status\":\"router-backed\"",
  "\"router_model_id\":\"qwen36-35b-a3b-q4\"",
  "\"runtime\":\"hermetic-llama-router\"",
  "chat produced by explicit llama.cpp router adapter; Faber-owned GGUF inference not implemented",
]
out_path = "/tmp/faber-ai-chat-router.jsonl"
expect_output_file = true
artifact_events = ["metadata", "prompt", "message", "final"]
artifact_contains = ["\"status\":\"router-backed\"", "external runtime adapter", "\"router_model_id\":\"qwen36-35b-a3b-q4\""]
exit = 0

