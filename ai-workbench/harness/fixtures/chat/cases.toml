[[case]]
id = "blocked-no-router-json"
args = [
  "chat",
  "examples/ai-workbench/harness/fixtures/chat/prompt.txt",
  "--model",
  "daily/qwen36-35b-a3b-q4",
  "--out",
  "/tmp/faber-ai-chat-blocked.jsonl",
  "--format",
  "json",
  "--alias-map",
  "examples/ai-workbench/harness/fixtures/chat/local-alias.toml",
]
stdout_contains = [
  "\"status\":\"blocked\"",
  "\"router_model_id\":\"qwen36-35b-a3b-q4\"",
  "requires an explicit router runner or reachable local router",
]
out_path = "/tmp/faber-ai-chat-blocked.jsonl"
expect_output_file = true
artifact_events = ["metadata", "diagnostic"]
artifact_contains = ["\"status\":\"blocked\"", "requires an explicit router runner"]
exit = 0

