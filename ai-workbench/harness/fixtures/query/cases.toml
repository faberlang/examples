[[case]]
id = "happy-query-top-two-json"
build_index = true
index_path = "/tmp/faber-ai-query-index.fvi"
args = [
  "query",
  "/tmp/faber-ai-query-index.fvi",
  "beta release",
  "--query-vector",
  "examples/ai-workbench/harness/fixtures/query/beta-query.fvi",
  "--top",
  "2",
  "--format",
  "json",
]
stdout_contains = [
  "\"status\":\"ok\"",
  "\"query\":\"beta release\"",
  "\"top\":2",
  "\"metric\":\"cosine\"",
]
expected_results = [
  { id = "beta", score = 1.0 },
  { id = "alpha", score = 0.0 },
]
exit = 0

