# Minimal examples-stage model artifact and tokenizer floor.

[model_artifact_floor]
format = "faber-ai-model-artifact-v0"
status = "local-ops"
scope = "metadata and tokenizer fixture contract only"
state_label = "local-ops"
future_state = "faber-owned"
valid_fixture = "examples/ai-workbench/harness/fixtures/model-artifact/tiny-model.fma.json"
unsupported_fixture = "examples/ai-workbench/harness/fixtures/model-artifact/unsupported-format.fma.json"
tokenizer_cases = "examples/ai-workbench/harness/fixtures/model-artifact/tokenizer-cases.json"
unsupported_format_diagnostic = "unsupported model artifact format"

[required_fields]
top_level = ["format", "status", "model", "metadata", "tensors", "tokenizer", "checksums", "diagnostics", "claims"]
metadata = ["architecture", "model_type", "dtype_policy", "tensor_count", "parameter_count", "tokenizer_class"]
tensor = ["name", "dtype", "shape", "checksum"]
tokenizer = ["format", "normalization", "unknown_token", "vocab", "checksum"]

[guarded_claims]
faber_owned_inference = false
llama_cpp_runtime = false
gguf_runtime = false
general_inference = false
public_product_release = false
model_blobs_in_git = false
implicit_model_downloads = false

[tokenizer_floor]
algorithm = "whitespace-token-fixture"
exact_encode = true
exact_decode = true
unknown_token = "<unk>"
unknown_token_id = 1
normalization = "identity"

[diagnostics]
valid = [
  "metadata-only model artifact fixture",
  "tokenizer fixture only; no runtime tokenization engine claimed",
  "Faber-owned inference not implemented",
]
unsupported = [
  "unsupported model artifact format",
]
