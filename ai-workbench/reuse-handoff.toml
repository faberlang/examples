# Stage 8C reuse handoff for product-to-systems follow-on work.

[handoff]
stage = "8C"
status = "ready-for-systems-reference"
mode = "product-first-oracle-honest"

[alias_fields]
required = ["alias", "source", "status", "local_path", "router_model_id"]
campaign_fixture = "docs/campaigns/ai-workbench/model-aliases.toml"
live_inventory_root = "/Users/ianzepp/ai/models"
host_path_redaction = true

[reuse_boundaries]
gpu_claims = false
owned_inference_claims = false
model_blobs_in_git = false
faber_ai_owns = [
  "CLI command shape",
  "portable artifact shape",
  "alias/inventory diagnostics",
  "oracle-backed validation labels",
]
radix_may_consume = [
  "cosine/dot batch pressure from query artifacts",
  "safetensors/GGUF metadata pressure",
  "future owned runtime gates only after separate delivery selection",
]
faber_ai_does_not_own = [
  "CUDA backend",
  "Faber-owned transformer inference",
  "PyTorch replacement binary",
  "implicit model downloads into git",
]

[validation]
tour_harness = "examples/ai-workbench/harness/check-campaign-tour.py"
lifecycle_harness = "examples/ai-workbench/harness/check-session-lifecycle.py"
hermetic = true
live_model_loads = false
allow_blocked_oracle_labels = true

[[artifacts]]
surface = "model inspect"
stage = "1+10a"
artifact = "metadata JSON/text"
systems_reuse = true
native_runtime_claim = false

[[artifacts]]
surface = "embed"
stage = "2+4"
artifact = "fvi-stage2"
systems_reuse = true
native_runtime_claim = false

[[artifacts]]
surface = "index"
stage = "3"
artifact = "fvi-stage3-index"
systems_reuse = true
native_runtime_claim = false

[[artifacts]]
surface = "query"
stage = "3+5"
artifact = "ranked JSON/text results"
systems_reuse = true
native_runtime_claim = false

[[artifacts]]
surface = "generate"
stage = "6"
artifact = "generation JSON-lines"
systems_reuse = false
native_runtime_claim = false

[[artifacts]]
surface = "chat"
stage = "7"
artifact = "chat JSON-lines"
systems_reuse = false
native_runtime_claim = false
