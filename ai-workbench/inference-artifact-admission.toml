# Examples-local admission boundary for AI Workbench inference artifacts.

[inference_artifact_admission]
format = "faber-ai-inference-artifact-admission-v0"
status = "local-ops"
scope = "parse and validate fixture artifacts only"
checker = "examples/ai-workbench/harness/check-inference-artifact-admission.py"
model_artifact_floor = "examples/ai-workbench/model-artifact-floor.toml"
token_logits_oracle = "examples/ai-workbench/harness/fixtures/generate/tiny_token_logits_oracle.py"
prompt = "examples/ai-workbench/harness/fixtures/generate/prompt.txt"
accepted_count = 3
malformed_count = 6

[guarded_claims]
faber_owned_inference = false
owned_model_runtime = false
general_inference = false
llama_cpp_parity = false
llama_cpp_equivalence = false
llama_cpp_runtime = false
gguf_runtime = false
transformer_execution = false
transformer_runtime = false
quantized_kernel_support = false
gpu_execution = false
gpu_runtime = false
gpu_runtime_claims = false
device_logits_execution = false
device_softmax_execution = false
device_training = false
public_inference = false
public_product_release = false
model_downloads = false
model_blobs_in_git = false
implicit_model_downloads = false
implicit_model_blobs = false

[[accepted_artifact]]
id = "tensor-metadata-row"
kind = "tensor-metadata"
artifact = "examples/ai-workbench/harness/fixtures/model-artifact/tiny-model.fma.json"
admission = "accepted"
runtime_claim = false
checks = ["format", "status", "tensor_count", "parameter_count", "tensor_checksums"]

[[accepted_artifact]]
id = "tokenizer-row"
kind = "tokenizer"
artifact = "examples/ai-workbench/harness/fixtures/model-artifact/tiny-model.fma.json"
admission = "accepted"
runtime_claim = false
checks = ["format", "unknown_token", "contiguous_vocab_ids", "vocab_checksum"]

[[accepted_artifact]]
id = "logits-row"
kind = "token-logits-jsonl"
artifact = "generated:tiny-token-logits-oracle"
admission = "accepted"
runtime_claim = false
checks = ["metadata_event", "prefill_event", "logits_event", "token_event", "final_event"]

[[malformed_artifact]]
id = "bad-tensor-metadata"
kind = "tensor-metadata"
artifact = "examples/ai-workbench/harness/fixtures/admission/bad-tensor-metadata.fma.json"
admission = "rejected"
reason = "tensor metadata shape/checksum mismatch"

[[malformed_artifact]]
id = "bad-tokenizer"
kind = "tokenizer"
artifact = "examples/ai-workbench/harness/fixtures/admission/bad-tokenizer.fma.json"
admission = "rejected"
reason = "tokenizer unknown token missing and vocabulary ids are not contiguous"

[[malformed_artifact]]
id = "bad-logits"
kind = "token-logits-jsonl"
artifact = "examples/ai-workbench/harness/fixtures/admission/bad-logits.jsonl"
admission = "rejected"
reason = "logits vector does not match tokenizer vocabulary"

[[malformed_artifact]]
id = "bad-artifact-claims"
kind = "tensor-metadata"
artifact = "examples/ai-workbench/harness/fixtures/admission/bad-claims-model.fma.json"
admission = "rejected"
reason = "artifact claims block must keep public/runtime/owned inference claims false"

[[malformed_artifact]]
id = "gguf-runtime-row"
kind = "gguf"
artifact = "examples/ai-workbench/harness/fixtures/model-inspect/files/tiny.gguf"
admission = "rejected"
reason = "GGUF files are inspect-only here, not admitted inference artifacts"

[[malformed_artifact]]
id = "transformer-runtime-row"
kind = "transformer-runtime"
artifact = "examples/ai-workbench/harness/fixtures/generate-metadata/config.json"
admission = "rejected"
reason = "transformer execution metadata is not an owned runtime"
