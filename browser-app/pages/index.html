<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Faber Browser App — WEB5 Fixture</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <main>
    <!-- Controller 1: Click class/text toggle -->
    <section id="toggle-demo">
      <h2>Toggle</h2>
      <button class="toggle-btn" type="button">Toggle</button>
      <span class="toggle-label">Off</span>
    </section>

    <!-- Controller 2: Input list filter -->
    <section id="filter-demo">
      <h2>Filter</h2>
      <input class="filter-input" type="text" placeholder="Filter items...">
      <ul class="filter-list">
        <li class="filter-item">Apple</li>
        <li class="filter-item">Banana</li>
        <li class="filter-item">Cherry</li>
      </ul>
    </section>

    <!-- Controller 3: Controlled submit -->
    <section id="submit-demo">
      <h2>Submit</h2>
      <form class="submit-form">
        <input type="text" name="query" placeholder="Search...">
        <button type="submit">Submit</button>
      </form>
      <p class="submit-status">idle</p>
    </section>

    <!-- Controller 4: Frame scheduling -->
    <section id="frame-demo">
      <h2>Frame</h2>
      <p class="frame-status">frame-pending</p>
    </section>

    <!-- Controller 5: Resize delivery -->
    <section id="resize-demo">
      <h2>Resize</h2>
      <p class="resize-status">resize-pending</p>
    </section>

    <!-- Controller 6: Keyboard delivery -->
    <section id="keyboard-demo">
      <h2>Keyboard</h2>
      <p class="keyboard-status" tabindex="0">keyboard-pending</p>
    </section>

    <!-- Controller 7: Pointer delivery -->
    <section id="pointer-demo">
      <h2>Pointer</h2>
      <p class="pointer-status">pointer-pending</p>
    </section>

    <!-- Controller 8: Focus delivery -->
    <section id="focus-demo">
      <h2>Focus</h2>
      <p class="focus-status" tabindex="0">focus-pending</p>
    </section>

    <!-- Controller 9: Pointer-lock request -->
    <section id="pointer-lock-request-demo">
      <h2>Pointer Lock Request</h2>
      <p class="pointer-lock-request-status">lock-request-pending</p>
    </section>

    <!-- Controller 10: Pointer-lock state delivery -->
    <section id="pointer-lock-state-demo">
      <h2>Pointer Lock State</h2>
      <p class="pointer-lock-state-status">lock-state-pending</p>
    </section>
  </main>
</body>
</html>
