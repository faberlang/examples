<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Faber Browser App — WEB5 Fixture</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <main>
    <!-- Controller 1: Click class/text toggle -->
    <section id="toggle-demo">
      <h2>Toggle</h2>
      <button class="toggle-btn" type="button">Toggle</button>
      <span class="toggle-label">Off</span>
    </section>

    <!-- Controller 2: Input list filter -->
    <section id="filter-demo">
      <h2>Filter</h2>
      <input class="filter-input" type="text" placeholder="Filter items...">
      <ul class="filter-list">
        <li class="filter-item">Apple</li>
        <li class="filter-item">Banana</li>
        <li class="filter-item">Cherry</li>
      </ul>
    </section>

    <!-- Controller 3: Controlled submit -->
    <section id="submit-demo">
      <h2>Submit</h2>
      <form class="submit-form">
        <input type="text" name="query" placeholder="Search...">
        <button type="submit">Submit</button>
      </form>
      <p class="submit-status">idle</p>
    </section>
  </main>
</body>
</html>
