[[case]]
id = "leading-shorter-spaces-default"
lane = "stepper"
tier = "A"
args = []
stdin = "    x\n"
stdout = "    x\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "interior-spaces-default"
lane = "stepper"
tier = "A"
args = []
stdin = "a        b\n"
stdout = "a        b\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "all-blanks-interior"
