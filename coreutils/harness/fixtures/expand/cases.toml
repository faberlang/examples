[[case]]
id = "empty-stdin"
lane = "stepper"
tier = "A"
args = []
stdin = ""
stdout = ""
stderr = ""
exit = 0

[[case]]
id = "line-without-tabs"
lane = "stepper"
tier = "A"
args = []
stdin = "alpha beta\n"
stdout = "alpha beta\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "leading-tab-default"
lane = "stepper"
tier = "A"
args = []
stdin = "\talpha\n"
stdout = "        alpha\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "interior-tab-default"
lane = "stepper"
tier = "A"
args = []
stdin = "abc\tz\n"
stdout = "abc     z\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "tabstop-four"
lane = "stepper"
tier = "A"
args = ["-t", "4"]
stdin = "ab\tz\n"
stdout = "ab  z\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "tabstop-list-four-eight"
lane = "stepper"
tier = "A"
args = ["-t", "4,8"]
stdin = "a\tb\tc\n"
stdout = "a   b   c\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "tabstop-list-after-final"
lane = "stepper"
tier = "A"
args = ["-t", "4,8"]
stdin = "a\tb\tc\td\n"
stdout = "a   b   c d\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "initial-only-default"
lane = "stepper"
tier = "A"
args = ["-i"]
stdin = "\ta\tb\n \tindented\nx\ty\n"
stdout = "        a\tb\n        indented\nx\ty\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "initial-only-tabstop-four"
lane = "stepper"
tier = "A"
args = ["-i", "-t", "4"]
stdin = "a\tb\n\tc\n \tc\n"
stdout = "a\tb\n    c\n    c\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "initial-only-tabstop-list"
lane = "stepper"
tier = "A"
args = ["-i", "-t", "4,8"]
stdin = "\ta\tb\n \tc\nx\ty\n"
stdout = "    a\tb\n    c\nx\ty\n"
stderr = ""
exit = 0
stdout_newline = true

[[case]]
id = "multiple-lines"
lane = "stepper"
tier = "A"
args = []
stdin = "\ta\nab\tc\nplain\n"
stdout = "        a\nab      c\nplain\n"
stderr = ""
exit = 0
stdout_newline = true
