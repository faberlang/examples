[[case]]
id = "three-column"
lane = "stepper"
tier = "A"
args = ["left", "right"]
stdin = ""
setup = "printf 'a\\nb\\n' > left && printf 'b\\nc\\n' > right"
stdout = "a\n\t\tb\n\tc\n"
stderr = ""
exit = 0

[[case]]
id = "suppress-column-one"
lane = "stepper"
tier = "A"
args = ["-1", "left", "right"]
stdin = ""
setup = "printf 'a\\nb\\n' > left && printf 'b\\nc\\n' > right"
stdout = "\tb\nc\n"
stderr = ""
exit = 0

